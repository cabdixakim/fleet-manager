kind = "web"
previewPath = "/"
title = "TransportPro - Transportation Business Manager"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.env]
PORT = "3000"
BASE_PATH = "/"

[services.production]
build = "pnpm run build"
run = "node artifacts/api-server/dist/index.cjs"
