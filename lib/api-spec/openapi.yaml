      operationId: getTripExpenses
      tags: [expenses]
      summary: Get trip expenses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripExpense"
    post:
      operationId: createTripExpense
      tags: [expenses]
      summary: Add trip expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripExpenseInput"
      responses:
