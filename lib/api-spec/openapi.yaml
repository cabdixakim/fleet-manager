  /clearances/board:
    get:
      operationId: getClearanceBoard
      tags: [clearances]
      summary: Cross-batch clearance board
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClearanceBoardRow"

  /trips/{id}/delivery-note:
    get:
      operationId: getTripDeliveryNote
      tags: [trips]
      summary: Get delivery note for trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
