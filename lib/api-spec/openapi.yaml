    delete:
      operationId: deleteTripExpense
      tags: [expenses]
      summary: Delete trip expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/{id}/clearances:
    get:
      operationId: getTripClearances
      tags: [clearances]
      summary: Get clearances for a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
