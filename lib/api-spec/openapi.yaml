      summary: Commission earned report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [month, quarter, year]
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionReport"

