  /company-expenses/{id}:
    put:
      operationId: updateCompanyExpense
      tags: [finance]
      summary: Update company expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyExpenseInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyExpense"
    delete:
      operationId: deleteCompanyExpense
      tags: [finance]
      summary: Delete company expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /reports/pnl:
    get:
      operationId: getPnlReport
      tags: [reports]
      summary: Company P&L report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [month, quarter, year]
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlReport"

  /reports/commission:
    get:
      operationId: getCommissionReport
